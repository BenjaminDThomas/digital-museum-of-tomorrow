services:
  museum-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: museum-app-cpu
    ports:
      - "80:80"
      - "11434:11434"
    restart: unless-stopped
    environment:
      - MODEL_ID=runwayml/stable-diffusion-v1-5
      - OLLAMA_MODEL=phi3:mini
    labels:
      - "com.museum.app=museum-app"
      - "com.museum.version=1.0.0"
      - "com.museum.mode=cpu"
