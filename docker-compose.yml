version: '3.8'

services:
  museum-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: museum-app
    ports:
      - "80:80"
    restart: unless-stopped
    gpus: all
    environment:
      - MODEL_ID=runwayml/stable-diffusion-v1-5
    labels:
      - "com.museum.app=museum-app"
      - "com.museum.version=1.0.0"
